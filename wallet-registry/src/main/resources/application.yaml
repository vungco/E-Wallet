spring:
  application:
    name: wallet-registry
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:wallet_db}?useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  grpc:
    server:
      enabled: ${GRPC_SERVER_ENABLED:true}
      port: ${GRPC_PORT:9090}
      # Postman / grpcurl list services; prod: GRPC_REFLECTION_ENABLED=false
      reflection-enabled: ${GRPC_REFLECTION_ENABLED:false}
      max-inbound-message-size-bytes: ${GRPC_MAX_INBOUND_MESSAGE_SIZE_BYTES:4194304}
  security:
    internal-api-key: ${INTERNAL_API_KEY:}
    require-internal-key: ${REQUIRE_INTERNAL_KEY:true}
  jwt:
    # HS256: nên >= 256 bit (32 byte). Đặt qua env JWT_SECRET trên môi trường thật.
    secret: ${JWT_SECRET:dev-only-change-me-use-openssl-rand-hex-32-minimum}
    issuer: ${JWT_ISSUER:wallet-registry}
    access-token-expiration-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_DAYS:30}

---
spring:
  config:
    activate:
      on-profile: dev

app:
  security:
    require-internal-key: false
  grpc:
    server:
      reflection-enabled: true

logging:
  level:
    org.hibernate.SQL: ${LOG_SQL:WARN}
