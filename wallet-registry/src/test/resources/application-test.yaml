spring:
  datasource:
    url: jdbc:h2:mem:wallet_registry_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  grpc:
    server:
      enabled: false
  security:
    require-internal-key: false
  jwt:
    secret: test-jwt-secret-must-be-at-least-32-bytes-long
    issuer: wallet-registry-test
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 30
