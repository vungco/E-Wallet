spring:
  datasource:
    url: jdbc:h2:mem:notification_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    consumer:
      auto-offset-reset: earliest

app:
  grpc:
    server:
      enabled: false
  kafka:
    topics:
      wallet-transfer-completed: wallet.transfer.completed
      wallet-transfer-failed: wallet.transfer.failed
