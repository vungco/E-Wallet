syntax = "proto3";

package wallet.v1;

option java_multiple_files = true;
option java_package = "com.app.ewallet.grpc.wallet.v1";
option java_outer_classname = "LedgerProto";

service WalletLedger {
  rpc DebitWallet (DebitWalletRequest) returns (WalletOperationResponse);
  rpc CreditWallet (CreditWalletRequest) returns (WalletOperationResponse);
}

message DebitWalletRequest {
  int64 wallet_id = 1;
  string amount = 2;
}

message CreditWalletRequest {
  int64 wallet_id = 1;
  string amount = 2;
}

message WalletOperationResponse {
  int64 wallet_id = 1;
  string balance_after = 2;
  int64 version = 3;
  bool replayed = 4;
}
