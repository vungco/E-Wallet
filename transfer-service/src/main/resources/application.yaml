spring:
  application:
    name: transfer-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:transfer_db}?useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:transfer-service}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    listener:
      ack-mode: record

# HTTP chỉ phục vụ actuator (health); API chính là gRPC (TRANSFER_GRPC_PORT)
server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  redis:
    pubsub:
      # Cùng kênh với ws-gateway — pub ngay sau commit (không qua Kafka)
      transfer-result-channel: ${REDIS_TRANSFER_RESULT_CHANNEL:ewallet:transfer:result}
  outbox:
    publish-interval-ms: ${OUTBOX_PUBLISH_INTERVAL_MS:1000}
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-use-openssl-rand-hex-32-minimum}
    issuer: ${JWT_ISSUER:wallet-registry}
    access-token-expiration-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_DAYS:30}
  grpc:
    # gRPC server cho ewallet-gateway (cổng tách HTTP)
    server:
      enabled: ${TRANSFER_GRPC_SERVER_ENABLED:true}
      port: ${TRANSFER_GRPC_PORT:9093}
      reflection-enabled: ${TRANSFER_GRPC_REFLECTION_ENABLED:false}
      max-inbound-message-size-bytes: ${TRANSFER_GRPC_MAX_INBOUND_BYTES:4194304}
    wallet:
      host: ${WALLET_GRPC_HOST:localhost}
      port: ${WALLET_GRPC_PORT:9090}
      internal-api-key: ${WALLET_INTERNAL_API_KEY:}
  kafka:
    topics:
      transfer-command: ${KAFKA_TOPIC_TRANSFER_COMMAND:transfer.command}
      wallet-transfer-completed: ${KAFKA_TOPIC_WALLET_TRANSFER_COMPLETED:wallet.transfer.completed}

---
spring:
  config:
    activate:
      on-profile: dev

app:
  grpc:
    server:
      reflection-enabled: true

logging:
  level:
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN
