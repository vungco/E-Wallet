spring:
  application:
    name: ewallet-gateway

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# transfer-service gRPC (TransferService)
# wallet-registry gRPC (WalletRegistryPublic + ledger nội bộ transfer-service)
app:
  transfer:
    grpc:
      host: ${TRANSFER_GRPC_HOST:localhost}
      port: ${TRANSFER_GRPC_PORT:9093}
      internal-api-key: ${TRANSFER_INTERNAL_API_KEY:${WALLET_INTERNAL_API_KEY:${INTERNAL_API_KEY:wallet-production}}}
  notification:
    grpc:
      host: ${NOTIFICATION_GRPC_HOST:localhost}
      port: ${NOTIFICATION_GRPC_PORT:9095}
  wallet-registry:
    host: ${WALLET_GRPC_HOST:localhost}
    port: ${WALLET_GRPC_PORT:9090}
    # Không để biến env rỗng (=) — dùng INTERNAL_API_KEY chung với wallet-registry hoặc default dev
    internal-api-key: ${WALLET_INTERNAL_API_KEY:${INTERNAL_API_KEY:wallet-production}}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-use-openssl-rand-hex-32-minimum}
    issuer: ${JWT_ISSUER:wallet-registry}
