spring:
  application:
    name: ws-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Trùng JWT_SECRET / JWT_ISSUER với wallet-registry (cùng HS256 verify token handshake WS)
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-use-openssl-rand-hex-32-minimum}
    issuer: ${JWT_ISSUER:wallet-registry}
    access-token-expiration-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_DAYS:30}
  redis:
    pubsub:
      transfer-result-channel: ${REDIS_TRANSFER_RESULT_CHANNEL:ewallet:transfer:result}
  ws:
    cors:
      allowed-origins: ${WS_CORS_ALLOWED_ORIGINS:}
